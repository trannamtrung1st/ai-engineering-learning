# Ephemeral integration / API e2e test stack — isolated ports and volumes from dev preview.
# Started by: npm run aih:test:stack:reset (project attendly-test)
name: attendly-test

services:
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: attendly
      POSTGRES_PASSWORD: attendly
      POSTGRES_DB: attendly_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendly -d attendly_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    ports:
      - "9002:9000"
    environment:
      MINIO_ROOT_USER: attendly
      MINIO_ROOT_PASSWORD: attendlyattendly
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
