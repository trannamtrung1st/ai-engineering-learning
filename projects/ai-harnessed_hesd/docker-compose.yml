# Attendly local dev runtime — postgres, redis, optional full-preview api/web.
# Dev preview (aih:preview) uses profile-less db + redis; API/web run as local Node processes.
# Full preview: docker compose --profile full-preview up -d --build
name: attendly

networks:
  attendly-local-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

services:
  db:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - attendly-local-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - attendly-local-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: [full-preview]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      PORT: "3001"
      APP_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret}
      QR_TOKEN_TTL_SECONDS: ${QR_TOKEN_TTL_SECONDS:-30}
      DEFAULT_GPS_RADIUS_METERS: ${DEFAULT_GPS_RADIUS_METERS:-100}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendly-local-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/api/v1/health').then((r)=>r.json()).then((b)=>process.exit(b.status==='ok'?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    profiles: [full-preview]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
    ports:
      - "${AIH_PREVIEW_WEB_PORT:-3007}:3007"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - attendly-local-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3007/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  migrate:
    profiles: [full-preview]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - attendly-local-net
    command: ["node", "scripts/db-migrate.mjs"]
    restart: "no"

  seed:
    profiles: [full-preview]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-app}
      SEED_ENABLED: "true"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - attendly-local-net
    command: ["node", "scripts/db-seed.mjs"]
    restart: "no"
